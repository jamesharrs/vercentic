name: CI — Vercentic

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
  workflow_call:  # allows deploy-production.yml to call this as a reusable workflow

jobs:
  # ── 1. Build check ───────────────────────────────────────────────────────────
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client deps
        run: cd client && npm ci

      - name: Vite build
        run: cd client && npm run build

      - name: Upload build artefact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: client/dist
          retention-days: 1

  # ── 2. Server startup check ──────────────────────────────────────────────────
  server-check:
    name: Server startup check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: cd server && npm ci


      - name: Syntax check all server files
        run: |
          for f in server/index.js server/db/init.js server/routes/*.js; do
            node --check "$f" && echo "✓ $f"
          done

      - name: Server starts without error
        run: |
          cd server
          echo '{"environments":[],"users":[],"roles":[]}' > ../data/talentos.json
          ANTHROPIC_API_KEY=test-key timeout 5 node index.js &
          sleep 3
          curl -sf http://localhost:3001/api/health && echo "✓ Server healthy"
          kill %1 2>/dev/null || true
        env:
          NODE_ENV: ci

  # ── 3. E2E tests (Playwright) — PRs to main only ─────────────────────────────
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    needs: [build, server-check]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: |
          cd server && npm ci
          cd ../client && npm ci

      - name: Install Playwright browsers
        run: cd client && npx playwright install --with-deps chromium

      - name: Start server
        run: |
          echo '{"environments":[],"users":[],"roles":[]}' > data/talentos.json
          cd server && PLAYWRIGHT_TEST=1 ANTHROPIC_API_KEY=test-key node index.js &
          sleep 3
          curl -sf http://localhost:3001/api/health

      - name: Start client
        run: cd client && npm run dev &
        env:
          VITE_API_URL: http://localhost:3001

      - name: Wait for client
        run: sleep 5

      - name: Run E2E suite
        run: cd client && npx playwright test e2e/core/provisioning.spec.js
        env:
          PLAYWRIGHT_TEST: '1'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
