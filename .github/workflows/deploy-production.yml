name: Deploy — Production gate

on:
  push:
    branches: [main]

jobs:
  # ── Gate: full CI must pass before any deploy ────────────────────────────────
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Railway deploys automatically from main via GitHub integration ────────────
  notify-railway:
    name: Railway deploy triggered
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - name: Confirm Railway deploy
        run: |
          echo "✅ CI passed — Railway is auto-deploying from main."
          echo "   Dashboard: https://railway.app"
          echo "   Health:    https://talentos-production-4045.up.railway.app/api/health"

  # ── Deploy client to Vercel production ───────────────────────────────────────
  deploy-vercel:
    name: Deploy client → Vercel (production)
    runs-on: ubuntu-latest
    needs: ci-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm i -g vercel@latest
      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client
      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: client


  # ── Post-deploy health check ──────────────────────────────────────────────────
  health-check:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: [notify-railway, deploy-vercel]
    steps:
      - name: Wait for Railway to stabilise
        run: sleep 30

      - name: Check API health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://talentos-production-4045.up.railway.app/api/health)
          echo "API status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Check frontend
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            https://www.vercentic.com)
          echo "Frontend status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: All checks passed
        run: echo "✅ Production deployment healthy."
